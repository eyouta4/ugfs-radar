# ============================================================
# UGFS-Radar — Stack de développement local
# ============================================================
# Lance Postgres+pgvector + l'API FastAPI + le worker scheduler.
# Usage :
#   cp .env.example .env       # remplir les clés
#   docker compose -f deploy/docker-compose.yml up
# Puis ouvre http://localhost:8000/docs

version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ugfs
      POSTGRES_PASSWORD: ugfs
      POSTGRES_DB: ugfs_radar
    ports:
      - "5432:5432"
    volumes:
      - ugfs_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugfs"]
      interval: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://ugfs:ugfs@db:5432/ugfs_radar"
      DATABASE_URL_SYNC: "postgresql+psycopg2://ugfs:ugfs@db:5432/ugfs_radar"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ../src:/app/src      # hot reload en dev
      - ../scripts:/app/scripts
      - ../data:/app/data

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://ugfs:ugfs@db:5432/ugfs_radar"
      DATABASE_URL_SYNC: "postgresql+psycopg2://ugfs:ugfs@db:5432/ugfs_radar"
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "scripts.scheduler"]
    volumes:
      - ../src:/app/src
      - ../scripts:/app/scripts
      - ../data:/app/data

volumes:
  ugfs_db_data:
